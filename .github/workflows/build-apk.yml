name: Build Kivy APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: digreatbrian/buildozer-action@v2
        with:
          buildozer-cmd: buildozer android debug

      - uses: actions/upload-artifact@v4
        with:
          name: kivy-apk
          path: bin/*.apk
